version: 2
updates:
  # --- main ---
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - php

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - javascript

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci

  # --- 3.x ---
  - package-ecosystem: composer
    directory: /
    target-branch: 3.x
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - php

  - package-ecosystem: github-actions
    directory: /
    target-branch: 3.x
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci

  # --- 4.x ---
  - package-ecosystem: composer
    directory: /
    target-branch: 4.x
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - php

  - package-ecosystem: github-actions
    directory: /
    target-branch: 4.x
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
